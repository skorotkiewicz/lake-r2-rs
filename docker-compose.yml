services:
  lake:
    build: .
    container_name: lake
    image: lake
    ports:
      - "3000:3000"
    environment:
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:?set R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?set R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?set R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:?set R2_BUCKET}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      DB_PATH: /data/lake.sqlite3
      LISTEN_ADDR: 0.0.0.0:3000
    volumes:
      - lake-data:/data

volumes:
  lake-data:
